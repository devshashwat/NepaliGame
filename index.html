<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nepali Flappy Bird</title>
<style>
  body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #87CEEB;
    font-family: sans-serif;
  }
  canvas {
    background: #a0d8ef;
    border: 2px solid #333;
  }
  #score {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    font-size: 24px;
    text-shadow: 1px 1px 2px black;
  }
  #gameOver {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 32px;
    text-align: center;
    text-shadow: 1px 1px 2px black;
    display: none;
  }
</style>
</head>
<body>
<canvas id="game" width="400" height="600"></canvas>
<div id="score">0</div>
<div id="gameOver">Game Over<br><button onclick="startGame()">Restart</button></div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const gameOverEl = document.getElementById('gameOver');

let bird, pipes, score, animationId, gameRunning;

function startGame() {
  bird = { x: 60, y: canvas.height / 2, radius: 12, velocity: 0 };
  pipes = [];
  score = 0;
  gameRunning = true;
  gameOverEl.style.display = 'none';
  scoreEl.textContent = '0';
  if (animationId) cancelAnimationFrame(animationId);
  spawnPipe();
  loop();
}

function spawnPipe() {
  const gap = 140;
  const topHeight = Math.floor(Math.random() * (canvas.height - gap - 100)) + 50;
  pipes.push({ x: canvas.width, top: topHeight, bottom: topHeight + gap });
}

function drawBackground() {
  ctx.fillStyle = '#87CEEB';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  // simple mountains
  ctx.fillStyle = '#999';
  ctx.beginPath();
  ctx.moveTo(0, canvas.height);
  ctx.lineTo(100, 450);
  ctx.lineTo(200, canvas.height);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(150, canvas.height);
  ctx.lineTo(280, 420);
  ctx.lineTo(400, canvas.height);
  ctx.fill();
}

function drawBird() {
  ctx.fillStyle = '#FF0';
  ctx.beginPath();
  ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#F90';
  ctx.beginPath();
  ctx.moveTo(bird.x + bird.radius, bird.y);
  ctx.lineTo(bird.x + bird.radius + 8, bird.y - 4);
  ctx.lineTo(bird.x + bird.radius + 8, bird.y + 4);
  ctx.closePath();
  ctx.fill();
}

function drawPipes() {
  ctx.fillStyle = '#8B4513';
  pipes.forEach(pipe => {
    ctx.fillRect(pipe.x, 0, 50, pipe.top);
    ctx.fillRect(pipe.x, pipe.bottom, 50, canvas.height - pipe.bottom);
  });
}

function update() {
  bird.velocity += 0.5;
  bird.y += bird.velocity;

  if (bird.y + bird.radius > canvas.height || bird.y - bird.radius < 0) {
    endGame();
  }

  pipes.forEach(pipe => {
    pipe.x -= 2;
  });

  if (pipes.length && pipes[0].x + 50 < 0) {
    pipes.shift();
    score++;
    scoreEl.textContent = score;
  }

  if (pipes.length && pipes[pipes.length - 1].x < canvas.width - 200) {
    spawnPipe();
  }

  pipes.forEach(pipe => {
    if (
      bird.x + bird.radius > pipe.x &&
      bird.x - bird.radius < pipe.x + 50 &&
      (bird.y - bird.radius < pipe.top || bird.y + bird.radius > pipe.bottom)
    ) {
      endGame();
    }
  });
}

function loop() {
  drawBackground();
  drawPipes();
  drawBird();
  update();
  if (gameRunning) {
    animationId = requestAnimationFrame(loop);
  }
}

function flap() {
  if (!gameRunning) return;
  bird.velocity = -8;
}

function endGame() {
  gameRunning = false;
  gameOverEl.style.display = 'block';
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space') flap();
});
canvas.addEventListener('mousedown', flap);

startGame();
</script>
</body>
</html>
